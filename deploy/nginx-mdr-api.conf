## Install to: /etc/nginx/sites-available/mdr-api
## Enable:     ln -s /etc/nginx/sites-available/mdr-api /etc/nginx/sites-enabled/
##             nginx -t && systemctl reload nginx
##
## api.mdrlighting.co.nz -> MDR Inventory PUBLIC API (Flask/gunicorn on 127.0.0.1:5004)
##
## This is the public API surface ONLY. It must never reference or expose the
## tools.tankway.co.nz admin domain — the Flask app hard-blocks /inventory/*
## on this hostname (returns 404), so the admin panel is unreachable here.
##
## TLS BELOW IS ADDED BY CERTBOT. On a fresh rebuild, install this file with
## only the plain `server { server_name ...; location / {...} listen 80; }`
## part, confirm DNS (api.mdrlighting.co.nz -> the server IP) has propagated,
## then run:
##
##     certbot --nginx -d api.mdrlighting.co.nz
##
## Certbot rewrites this file, adding the 443 block and the 80 -> 443 redirect
## exactly as shown.

server {
    server_name api.mdrlighting.co.nz;

    location / {
        proxy_pass http://127.0.0.1:5004;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/api.mdrlighting.co.nz/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/api.mdrlighting.co.nz/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = api.mdrlighting.co.nz) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name api.mdrlighting.co.nz;
    return 404; # managed by Certbot
}
