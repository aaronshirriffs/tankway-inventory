## Install to: /etc/systemd/system/inventory.service.d/gunicorn.conf
## Then:  systemctl daemon-reload && systemctl restart inventory.service
##
## Runs the app under gunicorn instead of the Flask dev server.
##
## WHY 1 WORKER + THREADS (do not "scale up" the workers):
##   rate_limit.py keeps its counters, and storage.py its activity ring buffer,
##   in process memory. Multiple workers would each hold their own copy, so a
##   customer's effective rate limit would multiply by the worker count.
##   The workload is I/O-bound (waiting on Odoo), so threads give the
##   concurrency instead. Move that state to a shared store before adding workers.
##
## --timeout 180 is deliberate: a /v1/products call fans out to several Odoo
## XML-RPC calls and can exceed gunicorn's 30s default.
[Service]
ExecStart=
ExecStart=/root/inventory/venv/bin/gunicorn -w 1 --threads 8 --timeout 180 -b 127.0.0.1:5004 app:app
