## Paste this location block INSIDE the tools.tankway.co.nz server block in
## /etc/nginx/sites-enabled/default, then: nginx -t && systemctl reload nginx
##
## tools.tankway.co.nz/inventory/ -> the ADMIN PANEL (same app, same port 5004).
## The app separates the two surfaces by hostname, so the admin panel only
## answers on tools.tankway.co.nz; on api.mdrlighting.co.nz it 404s.
##
## Notes:
##  - The path prefix is NOT stripped (proxy_pass has no trailing URI), because
##    the Flask routes are themselves defined under /inventory/.
##  - Authelia SSO guards it via auth_request; the app then trusts the
##    Remote-User header injected by the gateway.
##  - proxy_set_header Accept-Encoding "" disables upstream gzip so sub_filter
##    can rewrite the HTML (it cannot operate on compressed responses).
##  - The sub_filter injects the floating "back to Tankway Tools" link on every
##    tool page. It is pinned bottom-left with safe-area insets so it clears the
##    mobile hamburger menu and the iOS home indicator.

location /inventory/ {
        proxy_pass http://127.0.0.1:5004;
        proxy_set_header Accept-Encoding "";
        sub_filter_once on;
        sub_filter_types text/html;
        sub_filter '</body>' '<a href="https://tools.tankway.co.nz/" style="position:fixed;bottom:max(16px,env(safe-area-inset-bottom,0px));left:max(14px,env(safe-area-inset-left,0px));z-index:2147483647;background:rgba(20,20,20,0.88);color:#eee;font:600 13px/1 sans-serif;text-decoration:none;padding:7px 12px;border-radius:999px;border:1px solid rgba(255,255,255,0.2);box-shadow:0 2px 8px rgba(0,0,0,0.4)">&#8592; Tankway Tools</a></body>';
        include /etc/nginx/snippets/authelia-authrequest.conf;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
}
